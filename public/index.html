<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskMatch Freelance Hub</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-flex">
        <div class="brand-logo" onclick="showScreen('landing-view')">
          TaskMatch
        </div>
        <nav id="nav-actions" class="nav-links">
          <button class="btn btn-outline" onclick="showScreen('login-view')">
            Login
          </button>
          <button class="btn btn-primary" onclick="showScreen('register-view')">
            Register
          </button>
        </nav>
      </div>
    </header>

    <main class="container content-main">
      <div id="landing-view" class="app-screen">
        <div class="hero-card">
          <h1>Find the Perfect Match for Any Freelance Task</h1>
          <p>
            Post jobs as a client or submit proposals as a freelance worker
            instantly.
          </p>
          <div class="hero-actions">
            <button
              class="btn btn-primary btn-lg"
              onclick="showScreen('register-view')"
            >
              Get Started Now
            </button>
          </div>
        </div>
      </div>

      <div id="login-view" class="app-screen dynamic-hidden">
        <div class="form-card">
          <h2>Welcome Back</h2>
          <form id="form-login" onsubmit="event.preventDefault()">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn btn-primary btn-block">
              Sign In
            </button>
          </form>
          <p class="form-footer">
            New here?
            <span onclick="showScreen('register-view')">Create an account</span>
          </p>
        </div>
      </div>

      <div id="register-view" class="app-screen dynamic-hidden">
        <div class="form-card">
          <h2>Create Workspace Profile</h2>
          <form id="form-register" onsubmit="event.preventDefault()">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" placeholder="John Doe" required />
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" placeholder="name@domain.com" required />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" placeholder="Min. 6 characters" required />
            </div>
            <div class="form-group">
              <label>Account Role</label>
              <select required>
                <option value="client">Client (Post Jobs)</option>
                <option value="worker">Worker (Apply to Tasks)</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block">
              Register Account
            </button>
          </form>
          <p class="form-footer">
            Already registered?
            <span onclick="showScreen('login-view')">Login</span>
          </p>
        </div>
      </div>

      <div id="dashboard-view" class="app-screen dynamic-hidden">
        <div class="dashboard-header">
          <h2 id="dash-title">Workspace Dashboard</h2>
          <div id="dash-actions"></div>
        </div>
        <div id="dash-content-list" class="grid-container"></div>
      </div>

      <div id="task-detail-view" class="app-screen dynamic-hidden">
        <button
          class="btn btn-outline btn-sm"
          onclick="showScreen('dashboard-view')"
        >
          ← Back to Dashboard
        </button>
        <div id="task-detail-card" class="detail-card"></div>
      </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/applications.js"></script>
    <script src="js/reviews.js"></script>
  </body>
</html>
